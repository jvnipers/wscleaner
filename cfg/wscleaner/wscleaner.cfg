wscleaner_exclude "" // Comma-separated list of addons that will not be deleted by the plugin.
wscleaner_auto_clean 1 // If 1, automatically clean unused workshop addons on every level init. Set to 0 to disable and use wscleaner_clean manually instead.
wscleaner_debug 0 // If 1, log snapshots of the workshop content folder and appworkshop_730.acf before and after each cleanup pass.

// Example of how to add/remove an addon from the list by its ID:
// wscleaner_exclude_add 3121168339 // Add an addon to the addon whitelist
// wscleaner_exclude_remove 3121168339 // Remove an addon from the addon whitelist
// wscleaner_clean // Manually trigger a cleanup pass.